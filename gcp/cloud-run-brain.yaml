# Mercury Brain — Cloud Run service definitions (Knative v1).
#
# Two services: one cold (scales to zero, batch traffic) and one warm
# (min-instances=1, interactive Discord traffic). Both serve the same
# image; only autoscaling + CPU allocation differ.
#
# Apply each one separately:
#   gcloud run services replace gcp/cloud-run-brain.yaml --region=us-central1
#
# (gcloud splits the multi-doc YAML and applies in order.)
#
# Image is updated by the deploy-brain workflow; the placeholder below is
# rewritten by `yq` before apply. SA `brain-runtime@abm-isu.iam.gserviceaccount.com`
# can be created later; until it exists, omit the serviceAccountName line.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mercury-brain-cold
  namespace: abm-isu
  labels:
    app: mercury-brain
    pool: cold
    project: abm-isu
  annotations:
    run.googleapis.com/launch-stage: BETA
    run.googleapis.com/ingress: internal
    run.googleapis.com/description: |
      Gemma 4 inference (cold pool). Scales to zero. Batch / non-interactive.
spec:
  template:
    metadata:
      labels:
        app: mercury-brain
        pool: cold
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/gpu-type: nvidia-l4
        run.googleapis.com/accelerator-count: "1"
    spec:
      containerConcurrency: 4
      timeoutSeconds: 300
      serviceAccountName: brain-runtime@abm-isu.iam.gserviceaccount.com
      containers:
        - name: brain
          image: us-central1-docker.pkg.dev/abm-isu/cortex/mercury-brain:e4b-latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: BRAIN_MODEL
              value: gemma4:e4b
            - name: PORT
              value: "8080"
            - name: OLLAMA_KEEP_ALIVE
              value: 24h
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 4
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
  traffic:
    - latestRevision: true
      percent: 100

---
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mercury-brain-warm
  namespace: abm-isu
  labels:
    app: mercury-brain
    pool: warm
    project: abm-isu
  annotations:
    run.googleapis.com/launch-stage: BETA
    run.googleapis.com/ingress: internal
    run.googleapis.com/description: |
      Gemma 4 inference (warm pool). min-instances=1, CPU always allocated.
      Target: <2 s first-token for interactive Discord traffic.
spec:
  template:
    metadata:
      labels:
        app: mercury-brain
        pool: warm
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/gpu-type: nvidia-l4
        run.googleapis.com/accelerator-count: "1"
    spec:
      containerConcurrency: 4
      timeoutSeconds: 300
      serviceAccountName: brain-runtime@abm-isu.iam.gserviceaccount.com
      containers:
        - name: brain
          image: us-central1-docker.pkg.dev/abm-isu/cortex/mercury-brain:e4b-latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: BRAIN_MODEL
              value: gemma4:e4b
            - name: PORT
              value: "8080"
            - name: OLLAMA_KEEP_ALIVE
              value: 24h
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 4
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
  traffic:
    - latestRevision: true
      percent: 100
